<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart Internship Portal</title>
</head>

<body>

    <h1>Smart Internship Portal</h1>

    <h2>Add New Internship</h2>

    <form>
        <label>Title:</label>
        <input type="text" placeholder="Enter internship title">
        <br><br>

        <label>Company:</label>
        <input type="text" placeholder="Enter company name">
        <br><br>

        <label>Location:</label>
        <input type="text" placeholder="Enter location">
        <br><br>

        <label>Stipend:</label>
        <input type="number" placeholder="Enter stipend">
        <br><br>

        <label>Duration:</label>
        <input type="text" placeholder="Enter duration">
        <br><br>

        <button type="submit">Add Internship</button>
    </form>

    <hr>

    <h2>Available Internships</h2>

    <div id="internship-list">
        <!-- Internships will appear here -->
    </div>

</body>

</html>
