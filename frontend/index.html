<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart Internship Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Smart Internship Portal</h1>

    <!-- Add Internship Form -->
    <section>

        <h2>Add Internship</h2>

        <form id="internshipForm">

            <input
                type="text"
                id="title"
                placeholder="Internship Title"
                required
            >

            <input
                type="text"
                id="company"
                placeholder="Company Name"
                required
            >

            <input
                type="text"
                id="location"
                placeholder="Location"
                required
            >

            <button type="submit">
                Add Internship
            </button>

        </form>

    </section>


    <!-- Internship List -->
    <section>

        <h2>Available Internships</h2>

        <p id="message"></p>

        <div id="internshipList">
            <p id="loading">Loading internships...</p>
        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
